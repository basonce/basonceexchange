<!--
BASONCE Email Base Template

-->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{TITLE}}</title></head>
<body style="margin:0;padding:0;background:#0B0E11;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0B0E11;padding:40px 16px;">
    <tr><td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#181A20;border:1px solid #2B3139;border-radius:16px;overflow:hidden;">
        <tr><td align="center" style="padding:32px 24px 16px 24px;background:linear-gradient(180deg,#1E2329 0%,#181A20 100%);">
          <img src="https://basonce.com/basonce_logo_son_biten.png" width="64" height="64" alt="BASONCE" style="display:block;border-radius:12px;">
          <h1 style="margin:16px 0 4px 0;color:#F0B90B;font-size:24px;letter-spacing:1px;font-weight:700;">BASONCE</h1>
          <p style="margin:0;color:#848E9C;font-size:11px;letter-spacing:3px;">EXCHANGE</p>
        </td></tr>
        <tr><td style="padding:32px 32px 8px 32px;">
          <h2 style="margin:0 0 16px 0;color:#EAECEF;font-size:22px;font-weight:600;">{{HEADLINE}}</h2>
          <div style="color:#B7BDC6;font-size:15px;line-height:1.6;">{{BODY}}</div>
        </td></tr>
        <tr><td align="center" style="padding:24px 32px 8px 32px;">
          <a href="{{CTA_URL}}" style="display:inline-block;padding:14px 36px;background:#F0B90B;color:#0B0E11;text-decoration:none;border-radius:8px;font-weight:700;font-size:15px;">{{CTA_LABEL}}</a>
        </td></tr>
        <tr><td style="padding:8px 32px 32px 32px;">
          <p style="color:#848E9C;font-size:12px;line-height:1.6;margin:16px 0 0 0;">Or copy this link to your browser:<br><span style="color:#5E6673;word-break:break-all;">{{CTA_URL}}</span></p>
          <div style="border-top:1px solid #2B3139;margin:24px 0 0 0;padding-top:16px;">
            <p style="color:#5E6673;font-size:12px;line-height:1.6;margin:0;">{{FOOTER_NOTE}}</p>
          </div>
        </td></tr>
      </table>
      <p style="color:#5E6673;font-size:11px;margin:16px 0 0 0;">
        © 2026 BASONCE Exchange · <a href="https://basonce.com" style="color:#848E9C;text-decoration:none;">basonce.com</a><br>
        Sent to {{ .Email }} · Do not reply to this email
      </p>
    </td></tr>
  </table>
</body>
</html>
