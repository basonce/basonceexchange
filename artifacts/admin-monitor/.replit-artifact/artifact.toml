kind = "web"
previewPath = "/admin-monitor/"
title = "Admin Monitor"
version = "1.0.0"
id = "artifacts/admin-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin-monitor/" ]
localPort = 22794

[services.development]
run = "pnpm --filter @workspace/admin-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-monitor", "run", "build" ]
publicDir = "artifacts/admin-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22794"
BASE_PATH = "/admin-monitor/"
