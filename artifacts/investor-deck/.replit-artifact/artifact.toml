kind = "slides"
previewPath = "/investor-deck/"
title = "Kite Exchange — Yatırımcı Sunumu"
version = "1.0.0"
id = "artifacts/investor-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/investor-deck/" ]
localPort = 18285

[services.development]
run = "pnpm --filter @workspace/investor-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/investor-deck", "run", "build" ]
publicDir = "artifacts/investor-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18285"
BASE_PATH = "/investor-deck/"
